plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.snowchat.app"
    compileSdk 36
    ndkVersion "28.0.12433566"
    buildToolsVersion "36.0.0"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        production.java.srcDirs += 'src/production/kotlin'
        staging.java.srcDirs += 'src/staging/kotlin'
        development.java.srcDirs += 'src/development/kotlin'
    }

    defaultConfig {
        // Base package name - Firebase will use flavor-specific google-services.json
        applicationId "com.snowchat.app"
        minSdk 24
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (System.getenv("ANDROID_KEYSTORE_PATH")) {
            release {
                storeFile file(System.getenv("ANDROID_KEYSTORE_PATH"))
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
            }
        } else {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    flavorDimensions "default"
    productFlavors {
        production {
            dimension "default"
            applicationId "com.snowchat.app"
            manifestPlaceholders = [appName: "SnowChat"]
        }
        staging {
            dimension "default"
            applicationId "com.snowchat.app.stg"
            manifestPlaceholders = [appName: "[STG] SnowChat"]
        }
        development {
            dimension "default"
            applicationId "com.snowchat.app.dev"
            manifestPlaceholders = [appName: "[DEV] SnowChat"]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt')
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

// Configure Google Services plugin to use flavor-specific google-services.json
after('plugins.google.gms.google-services') {
    tasks.all { task ->
        if (task.name.startsWith('process') && task.name.endsWith('GoogleServices')) {
            task.doFirst {
                println "Processing Google Services for ${task.name}"
            }
        }
    }
}

// Copy flavor-specific google-services.json before build
task copyGoogleServices {
    doLast {
        def buildVariant = android.productFlavors.collect { it.name }.find { buildName ->
            gradle.startParameter.taskNames.any { it.contains(buildName) }
        } ?: 'production'

        def flavorDir = "src/${buildVariant}"
        def flavorGoogleServices = file("${flavorDir}/google-services.json")
        def defaultGoogleServices = file('google-services.json')

        if (flavorGoogleServices.exists()) {
            println "Copying flavor-specific google-services.json for ${buildVariant}"
            copy {
                from flavorGoogleServices
                into '.'
                rename { 'google-services.json' }
            }
        } else if (defaultGoogleServices.exists()) {
            println "Using default google-services.json for ${buildVariant}"
        } else {
            println "WARNING: No google-services.json found for ${buildVariant}!"
        }
    }
}

preBuild.dependsOn copyGoogleServices

flutter {
    source '../..'
}
