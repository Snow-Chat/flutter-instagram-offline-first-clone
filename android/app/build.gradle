plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.snowchat.app"
    compileSdk 36
    ndkVersion "28.0.12433566"
    buildToolsVersion "36.0.0"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        production.java.srcDirs += 'src/production/kotlin'
        staging.java.srcDirs += 'src/staging/kotlin'
        development.java.srcDirs += 'src/development/kotlin'
    }

    defaultConfig {
        // Base package name
        applicationId "com.snowchat.app"
        minSdk 24
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (System.getenv("ANDROID_KEYSTORE_PATH")) {
            release {
                storeFile file(System.getenv("ANDROID_KEYSTORE_PATH"))
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
            }
        } else {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    flavorDimensions "default"
    productFlavors {
        production {
            dimension "default"
            applicationId "com.snowchat.app"
            manifestPlaceholders = [appName: "SnowChat"]
        }
        staging {
            dimension "default"
            applicationId "com.snowchat.app.stg"
            manifestPlaceholders = [appName: "[STG] SnowChat"]
        }
        development {
            dimension "default"
            applicationId "com.snowchat.app.dev"
            manifestPlaceholders = [appName: "[DEV] SnowChat"]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt')
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

// Copy flavor-specific google-services.json before Google Services plugin processes it
task copyGoogleServices {
    doLast {
        // Detect build flavor from task names
        def buildVariant = 'production'
        
        gradle.startParameter.taskNames.each { taskName ->
            if (taskName.toLowerCase().contains('development')) {
                buildVariant = 'development'
            } else if (taskName.toLowerCase().contains('staging')) {
                buildVariant = 'staging'
            } else if (taskName.toLowerCase().contains('production')) {
                buildVariant = 'production'
            }
        }
        
        println "[SnowChat] Copying google-services.json for flavor: ${buildVariant}"
        
        def flavorDir = "src/${buildVariant}"
        def flavorGoogleServices = file("${flavorDir}/google-services.json")
        def defaultGoogleServices = file('google-services.json')
        def targetFile = file('google-services.json')
        
        if (flavorGoogleServices.exists()) {
            println "[SnowChat] Found flavor-specific: ${flavorGoogleServices.absolutePath}"
            copy {
                from flavorGoogleServices
                into '.'
            }
            println "[SnowChat] Copied flavor google-services.json for ${buildVariant}"
        } else if (defaultGoogleServices.exists()) {
            println "[SnowChat] Using default google-services.json"
        } else {
            throw new GradleException("[SnowChat] ERROR: No google-services.json found for ${buildVariant} flavor!")
        }
    }
}

// Ensure copyGoogleServices runs before Google Services plugin processes the file
tasks.whenTaskAdded { task ->
    if (task.name == 'processDebugGoogleServices' || 
        task.name == 'processReleaseGoogleServices' ||
        task.name.contains('processGoogle')) {
        task.dependsOn copyGoogleServices
    }
}

preBuild.dependsOn copyGoogleServices

flutter {
    source '../..'
}
